Decisions Linux is the primary target The library is built for embedded Linux first. The first usable release will target Linux only. All Phase 2 work and the initial test setup target Linux through SocketCAN and the kernel ISO-TP socket. Windows support is a secondary target and lands in a later phase once the Linux build is stable.
This matches how the library will actually be used. The Cube product runs on Linux and is the first consumer.
No userspace ISO-TP in the initial scope Userspace ISO-TP is dropped from the initial implementation. The Linux backend will rely on the kernel ISO-TP socket through socketcan-isotp and nothing else. The uds-isotp crate listed in the repository structure will not be implemented in the first delivery.
Current RCUs are known to support the kernel ISO-TP socket type, so the implementation proceeds on that assumption. Avant should formally confirm this before Phase 2 starts to remove any remaining uncertainty.
Userspace ISO-TP becomes relevant again in two cases. First, once Windows support is added, since Windows has no kernel ISO-TP. Second, if a future Linux target ships with a kernel that lacks the ISO-TP socket. Neither case is in scope for the initial delivery.
Kvaser is the selected Windows CAN adapter Kvaser is the preferred Windows CAN adapter and was taken into study during the pre-study phase. The Kvaser CANlib SDK was reviewed and it exposes the entry points needed to implement the RawCan trait through Rust FFI. The integration is feasible and no blockers were found.
The adapter choice is not yet final. Avant needs to confirm Kvaser as the selected adapter before Phase 5 starts. The workspace structure allows other vendors to be added later as standalone crates, so the decision does not need to be made before the Windows phase begins.
Windows support is deferred to Phase 5. The transport and ISO-TP approach for Windows will be assessed when that phase starts, based on what the selected SDK provides at that point.
No Python bindings in the initial scope Python bindings are dropped from the initial delivery. The uds-py crate is not built and the PyO3 and maturin work originally planned in Phase 3 is removed from the plan.
The reason is that the Cube product is fully in Rust. The library will be consumed directly from Rust code with no Python layer in between. Adding Python bindings now would add work that no consumer is asking for.
Python bindings remain possible in a later phase if Avant decides to expose the library to existing Python services or tooling. The repository structure is laid out so that uds-py can be added as a new workspace crate later without any changes to the core crates.
Impact on the Plan These decisions cut visible scope from the initial delivery.
Removed from initial scope Moved to Userspace ISO-TP (uds-isotp) Phase 5, alongside the Windows backend Python bindings (uds-py) Future phase if requested by Avant Windows backend (Kvaser) Phase 5 PCAN and Vector backends Out of scope, not planned The initial delivery is now a Linux only Rust library built around uds-core, uds-transport, and uds-socketcan. The mock transport in uds-transport covers the test setup.
`}),e.add({id:1,href:"/test_pipeline/docs/v0.0.1/en/planning/repository_structure/",title:"Repository Structure",description:"Cargo workspace layout for the Avant UDS library, crate responsibilities, and dependency relationships.",content:`Overview The library is organised as a single Cargo workspace containing several crates. Each crate has one clear responsibility. Backends are not split by operating system, they are split by what they provide to the layer above. A backend either delivers full UDS PDUs to the service layer, or it delivers raw CAN frames to a userspace ISO-TP implementation that then provides the PDUs.
This keeps the dependency graph clean and avoids naming crates after an operating system unless they genuinely are tied to one. Vendor backends do not depend on platform wrapper crates. A downstream user picks the crates that match their hardware and runtime environment.
Workspace Layout workspace/ uds-transport/ Trait definitions and mock transport uds-core/ UDS service layer and session manager uds-isotp/ Userspace ISO-TP implementation uds-socketcan/ Linux kernel ISO-TP and raw CAN access uds-pcan/ PCAN vendor backend, raw CAN frames uds-kvaser/ Kvaser vendor backend, raw CAN frames uds-vector/ Vector vendor backend, raw CAN frames uds-doip/ DoIP backend (future) uds-py/ Python bindings via PyO3 and maturin Crate Responsibilities uds-transport Holds the two trait definitions used across the workspace. The UdsTransport trait represents anything that can send and receive UDS PDUs. The RawCan trait represents anything that can send and receive raw CAN frames. A mock transport that implements UdsTransport also lives here so unit tests in any crate can run without real hardware.
This crate has no external dependencies beyond what is needed to define the traits and compiles on any target.
uds-core Contains the UDS service layer and the session manager. Every UDS service is implemented as an async method on the UdsClient struct. The session manager runs as a background tokio task and keeps the active session alive with periodic TesterPresent frames. This crate depends only on uds-transport. It has no knowledge of CAN, ISO-TP, or any specific backend. Swapping a backend requires no changes here.
uds-isotp Userspace implementation of ISO 15765-2. Takes any type that implements RawCan and exposes a type that implements UdsTransport. Handles segmentation, flow control, and timeouts in Rust rather than relying on a kernel driver.
Used on Windows where there is no kernel ISO-TP, and on Linux installations where the kernel is too old to support the CAN_ISOTP socket type. The pre-study still has to confirm whether the Avant RCU kernel supports kernel-level ISO-TP. If it does not, this crate covers that case without any additional implementation work.
uds-socketcan Linux-only crate that wraps the kernel SocketCAN interface. Provides two things in one crate. First, an implementation of UdsTransport that uses the kernel ISO-TP socket (AF_CAN, SOCK_DGRAM, CAN_ISOTP). Second, an implementation of RawCan for raw frame access. Most Linux users only need the first. The raw frame access exists for the case where the kernel lacks ISO-TP support and userspace handling via uds-isotp is required.
Built on top of the socketcan and socketcan-isotp crates from the Rust ecosystem.
uds-pcan, uds-kvaser, uds-vector One crate per CAN adapter vendor. Each wraps the vendor SDK through Rust FFI and implements RawCan. None of them implement UdsTransport directly. To use any of them as a UDS transport, the user pairs the vendor crate with uds-isotp.
Each vendor crate has its own build script for locating the vendor SDK, setting link flags, and handling any runtime libraries. Keeping them as separate crates means each vendor backend can be maintained independently. Adding a new vendor in the future is one new crate, not edits to existing code.
Only the vendor backends that Avant actually requires will be implemented. The exact set depends on the open item from the pre-study about which Windows adapters are in scope.
uds-doip DoIP backend (ISO 13400) running over UDP/IP. Implements UdsTransport directly because DoIP carries its own framing and does not need ISO-TP. Operating system agnostic. Scoped as a later phase, included in the workspace layout only to show how it fits.
uds-py The Python binding layer. A cdylib crate built with maturin and PyO3 that re-exports the UdsClient and all service methods into Python. Async methods are wrapped with pyo3-asyncio on the tokio runtime. The Python API mirrors the Rust API as closely as possible so that documentation applies to both.
This crate has to be separate from uds-core because maturin requires a dedicated cdylib crate to produce the Python wheel.
Dependency Graph uds-py uds-core uds-transport uds-socketcan depends on uds-transport, implements UdsTransport and RawCan uds-isotp depends on uds-transport, implements UdsTransport on top of RawCan uds-pcan depends on uds-transport, implements RawCan uds-kvaser depends on uds-transport, implements RawCan uds-vector depends on uds-transport, implements RawCan uds-doip depends on uds-transport, implements UdsTransport uds-core never pulls in a backend crate as a dependency. The choice of backend is made at the application level by the code that constructs the UdsClient. This is what allows the same uds-core to run on Linux with SocketCAN, on Windows with any vendor adapter, or over DoIP, without recompilation of the core.
User Composition The set of crates a downstream user pulls in depends on the hardware and operating system they run on.
Scenario Crates required Linux with kernel ISO-TP (normal case) uds-core, uds-socketcan Linux with old kernel lacking CAN_ISOTP uds-core, uds-socketcan, uds-isotp Windows with PCAN adapter uds-core, uds-pcan, uds-isotp Windows with Kvaser adapter uds-core, uds-kvaser, uds-isotp Windows with Vector adapter uds-core, uds-vector, uds-isotp DoIP, any operating system uds-core, uds-doip Python on Linux uds-py (pulls the rest transitively) Reasoning Splitting by capability rather than by operating system has several practical benefits.
Vendor backends do not need to be tied to a platform. PCAN drivers exist for both Windows and Linux. A future Linux user with a PCAN adapter can pull uds-pcan directly, with nothing in the crate name or structure suggesting it is Windows-only.
Userspace ISO-TP becomes a single shared implementation. The same uds-isotp crate that covers Windows also covers the old-kernel Linux case identified as a risk in the pre-study. No duplication and no parallel implementations to keep in sync.
DoIP fits the same pattern without forcing a new naming convention. It implements UdsTransport directly and sits next to the CAN backends in the workspace without depending on any of them.
Build complexity stays in the crates that actually need it. Each vendor crate has its own build script and FFI layer. The core crates remain pure safe Rust with no build scripts and no unsafe code.
Feature flags within crates are kept to a minimum. Because each backend is its own crate, a user simply does not depend on what they do not need. There is no need for cross-platform feature gating in uds-core or uds-transport. The only feature flag worth keeping in uds-core is one for optional serde derives on the protocol types, used for logging and test fixtures.
Open Items Affecting Structure The set of vendor crates to implement depends on the Windows adapter decision from the pre-study. Until that decision is made, only the directory layout and trait definitions can be finalised. Whether uds-isotp is needed in the initial Linux scope depends on the kernel assessment of the target hardware. If the kernel is modern enough, this crate can be deferred to a later phase and built only when the first non-Linux backend lands. `}),e.add({id:2,href:"/test_pipeline/docs/v0.0.1/en/planning/delivery_timeline/",title:"Delivery Timeline",description:"Development phases, milestone schedule, and min/max delivery estimates for the Avant UDS library.",content:`Phases Phase 1 - Pre-study Target: w20-w24 (13 May - 13 June 2026) (some team members are in vacations so not the whole period is used)
Task Notes Status Review existing Rust libraries automotive_diag, ecu_diagnostics, automotive (I-CAN-hack) in progress Confirm requirements and service list Resolve proposed vs agreed services with Avant in progress Finalize architecture and interface design Transport trait, layer boundaries, feature flags in progress Assess user-space ISO-TP need Check kernel version on Avant RCU hardware not started Resolve Windows CAN adapter open item Which vendor SDKs must be wrapped not started Resolve client vs server scope Recommendation clientonly for initial scope not started Phase 2 - Core Implementation (Linux target) Target: w26-w32 (22 June - 7 August 2026)
Task Notes Status Repository setup GitHub, Cargo workspace, feature flags not started Protocol layer Service definitions, NRC enum, request/response types not started UDS session manager Session state machine, TesterPresent heartbeat task not started Transport abstraction trait Send/receive PDU interface, error type separation not started Linux ISO-TP backend socketcan + socketcan-isotp, async tokio integration not started Mock transport For unit testing without hardware not started Unit and integration tests Virtual CAN (vcan) on Linux for CI not started Phase 3 - Python Bindings Target: w33-w36 (10 August - 4 September 2026) - ~4 weeks
Task Notes Status PyO3 + maturin project setup Build pipeline for Python wheel not started Bind UdsClient and all agreed services Async methods via pyo3-asyncio not started Python-level error types Map Rust error variants to Python exceptions not started Basic Python usage test Smoke test against vcan or real hardware not started Phase 4 - Hardening and Documentation Target: w34-w37 (August - September 2026)
These tasks improve quality and maintainability but do not block the Cube product from using the library.
Task Notes Status Edge case handling Session timeout recovery, NRC 0x78 response pending retry not started Endianness and multi-arch validation Test on multi ARM target if available not started Full API documentation Rust doc comments, Python usage guide not started Extended integration tests Real hardware test scenarios not started Final review with Avant Hand over on completed library not started Phase 5 - Windows Backend Target: w35+
Depends on resolution of the open item. Which CAN adapter vendor to support on Windows. Each vendor requires a separate backend wrapping their SDK via Rust FFI. Cannot be planned in detail until the adapter decision is made.
Phase 6 - DoIP Backend (nice to have) Target: TBD
Scoped as a future phase. Requires DoIP crate evaluation (doip-tokio, doip-codec) and a DoIP-capable test environment. Avant need to decide.
Min / Max Estimates Minimum (optimistic) Milestone Date Pre-study complete w24 - 13 June 2026 Core Linux implementation done w30 - 25 July 2026 Python bindings done w35 - 29 August 2026 Hardening and full docs done w37 - 11 September 2026 Windows backend (1st vendor) w40 - early October 2026 DoIP backend TBD Maximum (conservative) Milestone Date Pre-study complete w25 - 20 June 2026 Core Linux implementation done w32 - 7 August 2026 Python bindings done w36 - 4 September 2026 Hardening and full docs done w38 - 18 September 2026 Windows backend (1st vendor) w43 - late October 2026 DoIP backend TBD Risks Risk Impact Mitigation Windows CAN adapter not decided Blocks Windows phase entirely Resolve in pre-study. Avant RCU kernel too old for socketcan-isotp Forces userspace ISO-TP implementation, +2-3 weeks Assess kernel version in pre-study phase Scope expansion (server side, DTC) Delays core delivery Keep initial scope to client-only. Defer formally in pre-study review. Most libs have only client side implementation adding on top only the required server side handlers. PyO3/tokio async integration complexity +1-2 weeks Prototype pyo3-asyncio early in Phase 3 Rust cross-compilation issues on target HW +1 week Test crosscompile to ARM target early in Phase 2 `}),e.add({id:3,href:"/test_pipeline/docs/v0.0.1/en/planning/existing_libraries/",title:"Existing UDS Libraries",description:"Notes on existing Rust UDS and automotive diagnostic libraries taken in consideration for the Avant UDS pre-study.",content:`automotive_diag Crate / Repo: https://github.com/oxibus/automotive_diag
License: MIT OR Apache-2.0
Description: Low-level, no_std compatible collection of structs and enums covering UDS (ISO-14229-1), KWP2000 (ISO-14230), OBD-II (ISO-9141), and DoIP (ISO-13400) protocol definitions. Has enum-to-byte conversions for all major service identifiers and response codes. Doesn’t implement any transport logic, session management, or security key handling. It’s just a protocol definitions layer.
ecu_diagnostics Crate / Repo: https://github.com/rnd-ash/ecu_diagnostics
License: GPL-3.0
Description: ECU diagnostic client covering UDS, KWP2000, and OBD-II. Has a high-level client API with structured request/response handling, FFI bindings for C/C++ interop, and a protocol server abstraction. Hardware support is mainly through the Windows PassThru (SAE J2534) API, with no native Linux SocketCAN integration.
automotive (I-CAN-hack) Crate / Repo: https://github.com/I-CAN-hack/automotive
License: MIT
Description: Async library combining CAN adapter support, ISO-TP transport, and a UDS client. Supports SocketCAN on Linux and the panda adapter (cross-platform via USB). Built for multi-ECU parallel communication using async/await.
libautomotive Crate / Repo: https://github.com/shishir-dey/libautomotive
License: MIT
Description: Early-stage library with an OSI-inspired architecture covering CAN/CAN-FD, J1939, ISO-TP, UDS, and OBD-II. MIT licensed. The architecture is well thought out but the implementation isn’t there yet - no releases published, API is unstable, and barely anyone is using it.
socketcan-isotp Crate / Repo: https://github.com/marcelbuesing/socketcan-isotp
Crate: https://crates.io/crates/socketcan-isotp
License: MIT
Description: Rust bindings for the Linux kernel’s SocketCAN ISO-TP interface. Has blocking and async access to ISO 15765-2 framing through the kernel’s native AF_CAN socket layer.
socketcan Crate: https://crates.io/crates/socketcan
License: MIT
Description: Rust bindings for Linux SocketCAN, fairly mature. Supports async via tokio, async-std, and smol. Gives access to raw CAN frames, CAN-FD, and filtering through the kernel’s native AF_CAN interface.
Crates which may help DoIP crates Repos / Crates:
https://github.com/marcelbuesing/doip https://crates.io/crates/doip-tokio https://crates.io/crates/doip-codec License: Various (MIT / Apache-2.0)
Description: A few small crates covering DoIP (ISO 13400) client/server, async tokio integration, and message encoding/decoding. None are mature or widely used.
`}),e.add({id:4,href:"/test_pipeline/docs/v0.0.1/en/planning/uds_architecture/",title:"UDS Architecture",description:"Architecture design for the Avant UDS library - layering, backends, crate selection, and Python bindings.",content:`Overview The library is a mostly client-side (tester)(To be further refined on the role during meetings) UDS implementation written in Rust. It targets embedded Linux as the primary platform, with Windows as a secondary target. The design uses a layered architecture so that backends (CAN, DoIP) can be swapped without touching the UDS service layer.
The public API is exposed both as a native Rust crate and through Python bindings via PyO3/maturin.
Layers in Detail UDS Service Layer Implements all required UDS services as typed request/response pairs. Protocol byte definitions, service identifiers, response codes, and NRC (Negative Response Code ) enums, are implemented from scratch within the library rather than imported from an external crate. This avoids taking a hard dependency on a third-party library whose API or data model may change between releases, which would force interface changes up the stack.
Existing open-source implementations such as automotive_diag are used as verified references during development to cross-check byte values, service encodings, and edge-case behaviour against a known-working baseline. The definitions are our own but the reference material is theirs.
Required services:
Service SID Status DiagnosticSessionControl 0x10 agreed ECUReset 0x11 agreed SecurityAccess 0x27 agreed ReadDataByIdentifier 0x22 agreed WriteDataByIdentifier 0x2E agreed RoutineControl 0x31 agreed RequestDownload 0x34 agreed RequestUpload 0x35 agreed TransferData 0x36 agreed RequestTransferExit 0x37 agreed RequestFileTransfer 0x38 agreed TesterPresent 0x3E agreed CommunicationControl 0x28 proposed ControlDTCSetting 0x85 proposed LinkControl 0x87 proposed DTC services are explicitly out of scope.
Each service is implemented as an async function on a UdsClient struct. Positive and negative responses map to typed Result variants. Negative Response Codes (NRC) are defined as an owned enum within the library.
UDS Session Manager Tracks the active diagnostic session (Default, Programming, Extended) and automatically sends periodic TesterPresent frames to keep the session alive. Runs as a background tokio task. The session manager is transparent to callers the UdsClient handles it internally (Result on how other crates have implemented it).
Transport Abstraction A single async trait defines the contract between the UDS layer and any backend. The trait exposes two operations. Sending a raw UDS PDU down to the transport and receiving one back up with no knowledge of what sits below. This boundary is the key design decision that keeps the UDS service layer entirely independent of physical transport details.
Any type that satisfies the trait can plug in as a backend. For example the Linux SocketCAN+ISO-TP stack, a future Windows FFI adapter, a DoIP socket, or a mock implementation used in unit tests. Swapping the backend requires no changes to the UDS service layer or session manager above it.
Error handling at this boundary distinguishes transport-level failures (frame loss, timeout, bus-off) from UDS-level negative responses, so callers always know which layer a failure came from.
ISO-TP Backend (Linux) Uses socketcan + socketcan-isotp to talk to the kernel’s native ISO-TP socket interface (AF_CAN, SOCK_DGRAM, CAN_ISOTP). This offloads all frame segmentation and flow control to the kernel, which is the most robust approach on Linux.
The Linux backend implements UdsTransport directly on top of an async socketcan-isotp socket.
A userspace ISO-TP implementation where segmentation and flow control are handled in the library rather than the kernel may be considered in a later phase if target environments require it (e.g. older kernels without ISO-TP socket support, or non-Linux POSIX systems). Because the transport trait isolates this layer, switching between kernel and user-space ISO-TP would not affect any code above it. (Action point: assess user-space ISO-TP need based on target hardware during pre-study. Check if older versions of Avnant RCUs do have al the kernel headers for socketcan and offloading on kernel)
ISO-TP Backend (Windows) No mature native Rust solution exists for Windows CAN. Unlike Linux where SocketCAN provides a unified kernel interface, Windows has no common hardware abstraction. Each CAN adapter vendor ships its own SDK and driver. This means the Windows layer will not be a single backend but rather one backend per supported vendor adapter (e.g. PCAN, Kvaser, Vector), each implementing the transport trait independently.
Each vendor backend integrates against that vendors SDK. The SDK may be written in C, C++, or any other language. What matters is that it can be compiled into a linkable library that Rust can call via FFI. Rust unsafe FFI boundary handles the interop, keeping the rest of the library fully safe. The transport trait ensures none of this vendor specific complexity leaks upward into the UDS service layer.
The specific adapter or adapters to support is an open item from the kick-off. This decision must be made before any Windows backend work begins, as it determines which SDKs need to be wrapped.
DoIP Backend (nice to have) DoIP replaces CAN+ISO-TP with UDP/IP as the physical transport. The UdsTransport trait applies identically. A DoipTransport struct sends and receives UDS PDUs over a DoIP connection. Candidate crates: doip-tokio, doip-codec. Scoped for a later phase after the Linux CAN backend is complete.
Cross-cutting Concerns Endianness Rust standard library provides u16::from_be_bytes / to_be_bytes etc. All multi-byte values in UDS are big-endian (network byte order). The service layer handles all byte order conversions explicitly. No unaligned memory access is used. All reads and writes go through safe byte-slice operations.
Architecture portability The library is compiled with Cargo’s cross-compilation support. The socketcan and socketcan-isotp crates are gated behind a backend-socketcan feature flag so that Windows and embedded builds do not pull in Linux-specific dependencies. A backend-doip feature flag similarly gates the DoIP backend.
Python bindings PyO3 + maturin expose the UdsClient and all service methods to Python. Async methods are wrapped with pyo3-asyncio (tokio runtime). The Python API mirrors the Rust API closely so that documentation applies to both.
Crate Selection Role Crate Reason Protocol definitions own implementation Avoids upstream API dependency; automotive_diag used as reference only Async runtime tokio Industry standard, required by socketcan and doip crates Linux CAN socketcan Mature, async, kernel-native Linux ISO-TP socketcan-isotp Kernel ISO-TP socket, offloads segmentation/flow control DoIP (future) doip-tokio / doip-codec Async DoIP, evaluate at DoIP phase Python bindings pyo3 + maturin Standard Rust/Python bridge Serialisation serde Optional. Useful for logging and test fixtures. It will tie logging to that crate. ecu_diagnostics is excluded as a dependency due to GPL-3.0 license incompatibility with the planned commercial licensing model. However, its source code may be studied as a reference for implementation patterns and service logic, provided no code is directly copied or derived from it.
Open Items Client vs server - during kick-off there were questions whether both sides should be covered. Recommendation: client only for the initial scope. Server support can be a later phase. Windows CAN adapter - which hardware adapter must be supported on Windows? This drives the FFI layer design entirely. When is the library needed for CUBE? - Timo mentioned August 2026. DoIP phasing - confirm DoIP is out of scope for the initial implementation project and tracked as a separate item (This was a suggestion). See Delivery Timeline for the full phase plan, milestone schedule, and min/max estimates.
