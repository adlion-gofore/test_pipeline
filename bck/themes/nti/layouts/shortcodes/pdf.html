{{- $path    := .Get 0 -}}
{{- $id      := printf "pdf-%s"       (md5 $path) -}}
{{- $modalId := printf "pdf-modal-%s" (md5 $path) -}}

<div class="pdf-embed">
  <div class="pdf-embed__toolbar">
    <button class="pdf-embed__btn"
            onclick="document.getElementById('{{ $modalId }}').classList.add('pdf-embed__modal--open')"
            aria-label="Expand to fullscreen">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
      </svg>
    </button>
  </div>
  <div id="{{ $id }}" class="pdf-embed__viewer"></div>
</div>

<div id="{{ $modalId }}" class="pdf-embed__modal">
  <div class="pdf-embed__modal-bar">
    <button class="pdf-embed__btn"
            onclick="document.getElementById('{{ $modalId }}').classList.remove('pdf-embed__modal--open')"
            aria-label="Exit fullscreen">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
      </svg>
    </button>
  </div>
  <div id="{{ $modalId }}-inner" class="pdf-embed__modal-inner"></div>
</div>

<script>
window._pdfEmbeds = window._pdfEmbeds || [];
window._pdfEmbeds.push(["{{ $path | relURL }}", "#{{ $id }}"]);
window._pdfEmbeds.push(["{{ $path | relURL }}", "#{{ $modalId }}-inner"]);
</script>
{{- .Page.Store.Set "hasPDF" true }}
