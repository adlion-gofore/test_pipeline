name: Deploy Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to deploy (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Install Dart Sass
        run: |
          DART_SASS_VERSION=1.89.2
          curl -LO https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz
          tar -xf dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz
          echo "$PWD/dart-sass" >> $GITHUB_PATH

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          key: ${{ runner.os }}-hugomod-${{ hashFiles('ci/docs/theme/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Prepare versioned docs
        run: |
          TAG=${{ github.ref_name }}
          if [ "$TAG" = "" ]; then TAG=${{ github.event.inputs.tag }}; fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          cp -r docs/next docs/$TAG
          rm -rf docs/next

      - name: Build
        working-directory: ci/docs/theme
        run: hugo --minify
        env:
          HUGO_CACHEDIR: /tmp/hugo_cache

      - name: Deploy to gh-pages
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          python3 - <<'EOF'
          import json, os

          new_version_path = "_site/new-version.json"
          versions_file    = "/tmp/gh-pages/versions.json"

          with open(new_version_path) as f:
              new_version = json.load(f)

          new_version["latest"] = True

          try:
              with open(versions_file) as f:
                  data = json.load(f)
              for v in data["versions"]:
                  v["latest"] = False
              data["versions"].insert(0, new_version)
          except FileNotFoundError:
              data = {"versions": [new_version]}

          with open(versions_file, "w") as f:
              json.dump(data, f, indent=2)
          EOF

          cp -r _site/. /tmp/gh-pages/

          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: deploy ${{ env.TAG }}"
          git push origin gh-pages
