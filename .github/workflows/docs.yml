name: Deploy Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          key: ${{ runner.os }}-hugomod-${{ hashFiles('ci/docs/theme/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Prepare versioned docs
        run: |
          TAG=${GITHUB_REF_NAME}
          cp -r docs/next docs/$TAG
          rm -rf docs/next

      - name: Build
        working-directory: ci/docs/theme
        run: hugo --minify
        env:
          HUGO_CACHEDIR: /tmp/hugo_cache

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
